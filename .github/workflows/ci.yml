name: CI - User Management

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: usermanagement
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"

      - name: Restaurar dependências
        run: dotnet restore ./backend/UserManagement.API

      - name: Build
        run: dotnet build ./backend/UserManagement.API --no-restore

      - name: Instalar EF Tools
        run: dotnet tool install --global dotnet-ef

      - name: Atualizar banco (migrations)
        run: dotnet ef database update --project ./backend/UserManagement.API

      - name: Rodar API
        run: dotnet run --project ./backend/UserManagement.API &

      - name: Esperar API subir
        run: sleep 10

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Instalar dependências
        run: npm install

      - name: Rodar Cypress
        run: npm run cy:run
